version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: corpemd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-corpemd}
      POSTGRES_USER:     ${POSTGRES_USER:-corpemd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corpemd}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    container_name: corpemd_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: corpemd_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-corpemd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-corpemd}
      REDIS_URL:    redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [internal]
    expose: ["3000"]

volumes:
  postgres_data:
  redis_data:

networks:
  internal: { driver: bridge }
